<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Strawberry Farm Plot Planner</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Arial,sans-serif; background:#f5f0e8; color:#4a3728; padding:16px; }
h1 { text-align:center; font-size:1.4em; letter-spacing:.15em; color:#4a3728; margin-bottom:3px; font-family:'Courier New',monospace; }
.subtitle { text-align:center; font-size:.8em; color:#7a6555; margin-bottom:12px; }

.crop-panel { background:#eee8d8; border:1px solid #c8b89a; border-radius:8px; padding:10px 14px; margin-bottom:10px; }
.crop-panel h3 { font-size:.78em; letter-spacing:.1em; margin-bottom:7px; color:#5a4030; font-family:'Courier New',monospace; }
.crop-grid { display:flex; flex-wrap:wrap; gap:5px; }
.crop-btn {
  display:flex; align-items:center; gap:5px; padding:4px 10px;
  border:2px solid transparent; border-radius:14px; background:#f5f0e8;
  cursor:pointer; font-family:Arial,sans-serif; font-size:.75em; color:#4a3728; transition:all .12s;
}
.crop-btn:hover { opacity:.85; transform:scale(1.03); }
.crop-btn.active { border-color:#4a3728; background:#fff; font-weight:bold; }
.crop-btn .sw { width:12px; height:12px; border-radius:2px; flex-shrink:0; }
.crop-btn.clr { background:#ddd; color:#555; }
.crop-btn.clr.active { border-color:#555; }

.controls { display:flex; gap:8px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
.controls button {
  padding:5px 12px; border-radius:6px; border:1px solid #b8a890;
  cursor:pointer; font-family:Arial,sans-serif; font-size:.75em; background:#eee8d8; color:#4a3728;
}
.controls button:hover { background:#ddd5c0; }

#farm-svg { display:block; margin:0 auto; }

.legend { margin-top:12px; background:#eee8d8; border:1px solid #c8b89a; border-radius:8px; padding:10px 14px; }
.legend h3 { font-size:.75em; letter-spacing:.1em; margin-bottom:6px; color:#5a4030; font-family:'Courier New',monospace; }
.legend-grid { display:flex; flex-wrap:wrap; gap:5px 14px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:.72em; font-family:Arial,sans-serif; }
.legend-swatch { width:12px; height:12px; border-radius:2px; flex-shrink:0; }

.note-hint { text-align:center; font-size:.68em; color:#9a8a7a; margin-top:5px; font-family:Arial,sans-serif; }

.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200;
  align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal { background:#f5f0e8; border:2px solid #8a7060; border-radius:10px; padding:20px; width:320px; max-width:95vw; }
.modal h3 { font-size:.95em; margin-bottom:9px; color:#4a3728; font-family:Arial,sans-serif; }
.modal textarea {
  width:100%; height:90px; border:1px solid #b8a890; border-radius:5px;
  background:#fff; font-family:Arial,sans-serif; font-size:.85em; color:#4a3728; padding:7px; resize:vertical;
}
.modal-actions { display:flex; gap:7px; margin-top:9px; justify-content:flex-end; }
.modal-actions button {
  padding:5px 12px; border-radius:5px; border:1px solid #b8a890;
  cursor:pointer; font-family:Arial,sans-serif; font-size:.78em;
}
.btn-save { background:#5a7a4a; color:#fff; border-color:#4a6a3a; }
.btn-cancel { background:#eee8d8; color:#4a3728; }
.btn-clr-note { background:#c87060; color:#fff; border-color:#a85040; }
</style>
</head>
<body>

<h1>STRAWBERRY FARM PLOT PLANNER</h1>
<p class="subtitle">Click a crop · click a bed to assign · right-click a bed to add a note</p>

<div class="crop-panel">
  <h3>SELECT CROP TO PAINT</h3>
  <div class="crop-grid" id="cropGrid"></div>
</div>
<div class="controls">
  <button onclick="clearAll()">Clear All</button>
  <button onclick="exportData()">Export JSON</button>
  <button onclick="importData()">Import JSON</button>
</div>

<script>
const CROPS = [
  { id:'tomato',      label:'Tomato',       color:'#c0392b' },
  { id:'pepper',      label:'Pepper',        color:'#e67e22' },
  { id:'squash',      label:'Squash',        color:'#f39c12' },
  { id:'cucumber',    label:'Cucumber',      color:'#27ae60' },
  { id:'lettuce',     label:'Lettuce',       color:'#2ecc71' },
  { id:'herbs',       label:'Herbs',         color:'#1abc9c' },
  { id:'carrot',      label:'Carrot',        color:'#e8820c' },
  { id:'bean',        label:'Bean',          color:'#8e44ad' },
  { id:'garlic',      label:'Garlic',        color:'#7f8c8d' },
  { id:'sweetpotato', label:'Sweet Potato',  color:'#a0522d' },
  { id:'flower',      label:'Flower',        color:'#e91e8c' },
  { id:'brassica',    label:'Brassica',      color:'#16a085' },
  { id:'melon',       label:'Melon',         color:'#76b52a' },
  { id:'onion',       label:'Onion/Allium',  color:'#9b59b6' },
  { id:'corn',        label:'Corn',          color:'#d4ac0d' },
  { id:'covercrop',   label:'Cover Crop',    color:'#5d4037' },
  { id:'leafygreens', label:'Leafy Greens',  color:'#388e3c' },
  { id:'radish',      label:'Radish',        color:'#e53935' },
  { id:'beets',       label:'Beets',         color:'#880e4f' },
];
const CLEAR = { id:'', label:'Clear', color:'#ccc' };
let selectedCrop = null, bedData = {}, editingBedId = null;

function buildCropPanel() {
  const grid = document.getElementById('cropGrid');
  const cb = makeCropBtn(CLEAR); cb.classList.add('clr'); grid.appendChild(cb);
  CROPS.forEach(c => grid.appendChild(makeCropBtn(c)));
}
function makeCropBtn(crop) {
  const btn = document.createElement('button');
  btn.className = 'crop-btn'; btn.dataset.id = crop.id;
  btn.innerHTML = `<span class="sw" style="background:${crop.color}"></span>${crop.label}`;
  btn.addEventListener('click', () => selectCrop(crop));
  return btn;
}
function selectCrop(crop) {
  selectedCrop = crop.id === '' ? null : crop;
  document.querySelectorAll('.crop-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.id === crop.id));
}

function wireBeds() {
  document.querySelectorAll('.bed-group').forEach(g => {
    const id = g.dataset.id;
    g.style.cursor = 'pointer';
    g.addEventListener('click', () => paintBed(id));
    g.addEventListener('contextmenu', e => { e.preventDefault(); openModal(id); });
  });
}

function paintBed(id) {
  if (!bedData[id]) bedData[id] = {};
  bedData[id].crop = selectedCrop || null;
  renderBed(id);
}

function hex2rgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function renderBed(id) {
  const g = document.querySelector(`.bed-group[data-id="${id}"]`);
  if (!g) return;
  const data = bedData[id] || {};
  const crop = data.crop;
  const note = data.note || '';
  const rect = g.querySelector('.bed-rect');
  if (rect) {
    if (crop) {
      const [r,gr,b] = hex2rgb(crop.color);
      rect.setAttribute('fill', `rgba(${r},${gr},${b},0.35)`);
      rect.setAttribute('stroke', crop.color);
      rect.setAttribute('stroke-width', '2');
    } else {
      rect.setAttribute('fill', '#d9d1be');
      rect.setAttribute('stroke', '#b8a890');
      rect.setAttribute('stroke-width', '1');
    }
  }
  const lbl = g.querySelector('.bed-label');
  const noteEl = g.querySelector('.bed-note');
  const rect2 = g.querySelector('.bed-rect');

  if (id.startsWith('h')) {
    // HORIZONTAL BED: crop name left-center, note right-side
    const bx = parseFloat(rect2 ? rect2.getAttribute('x') : 30);
    const bw = parseFloat(rect2 ? rect2.getAttribute('width') : 210);
    const by = parseFloat(rect2 ? rect2.getAttribute('y') : 44);
    const bh = parseFloat(rect2 ? rect2.getAttribute('height') : 28);
    const midY = by + bh * 0.67;

    if (lbl) {
      lbl.textContent = crop ? crop.label : '';
      lbl.setAttribute('x', bx + bw * 0.35);
      lbl.setAttribute('y', midY);
      lbl.setAttribute('text-anchor', 'middle');
      lbl.removeAttribute('transform');
    }
    if (noteEl) {
      noteEl.textContent = note ? (note.length > 16 ? note.slice(0,14)+'…' : note) : '';
      noteEl.setAttribute('x', bx + bw - 6);
      noteEl.setAttribute('y', midY);
      noteEl.setAttribute('text-anchor', 'end');
      noteEl.removeAttribute('transform');
      noteEl.setAttribute('font-style', note ? 'italic' : 'normal');
    }
  } else {
    // VERTICAL BED: crop name upper portion, note lower portion
    const bx = parseFloat(rect2 ? rect2.getAttribute('x') : 266);
    const bw = parseFloat(rect2 ? rect2.getAttribute('width') : 40);
    const by = parseFloat(rect2 ? rect2.getAttribute('y') : 44);
    const bh = parseFloat(rect2 ? rect2.getAttribute('height') : 110);
    const cx = bx + bw / 2;

    if (lbl) {
      lbl.textContent = crop ? crop.label : '';
      const ly = by + bh * 0.32;
      lbl.setAttribute('x', cx);
      lbl.setAttribute('y', ly);
      lbl.setAttribute('text-anchor', 'middle');
      lbl.setAttribute('transform', `rotate(-90,${cx},${ly})`);
    }
    if (noteEl) {
      noteEl.textContent = note ? (note.length > 12 ? note.slice(0,10)+'…' : note) : '';
      const ny = by + bh * 0.72;
      noteEl.setAttribute('x', cx);
      noteEl.setAttribute('y', ny);
      noteEl.setAttribute('text-anchor', 'middle');
      noteEl.setAttribute('transform', `rotate(-90,${cx},${ny})`);
      noteEl.setAttribute('font-style', note ? 'italic' : 'normal');
    }
  }
}

function renderAll() { Object.keys(bedData).forEach(renderBed); }

function openModal(bedId) {
  editingBedId = bedId;
  document.getElementById('noteModalTitle').textContent = 'Note — Bed ' + bedId.toUpperCase();
  document.getElementById('noteText').value = (bedData[bedId] || {}).note || '';
  document.getElementById('noteModal').classList.add('open');
  setTimeout(() => document.getElementById('noteText').focus(), 50);
}
function closeModal() {
  document.getElementById('noteModal').classList.remove('open');
  editingBedId = null;
}
function saveNote() {
  if (!editingBedId) return;
  if (!bedData[editingBedId]) bedData[editingBedId] = {};
  bedData[editingBedId].note = document.getElementById('noteText').value.trim();
  renderBed(editingBedId);
  closeModal();
}
function clearNote() {
  if (!editingBedId) return;
  if (bedData[editingBedId]) bedData[editingBedId].note = '';
  renderBed(editingBedId);
  closeModal();
}
document.getElementById('noteModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function clearAll() {
  if (!confirm('Clear all beds and notes?')) return;
  bedData = {};
  document.querySelectorAll('.bed-group').forEach(g => {
    const rect = g.querySelector('.bed-rect');
    if (rect) { rect.setAttribute('fill','#d9d1be'); rect.setAttribute('stroke','#b8a890'); rect.setAttribute('stroke-width','1'); }
    const lbl = g.querySelector('.bed-label'); if (lbl) lbl.textContent = '';
    const noteEl = g.querySelector('.bed-note'); if (noteEl) noteEl.textContent = '';
  });
}
function exportData() {
  const blob = new Blob([JSON.stringify(bedData,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'farm-plan.json'; a.click();
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => { try { bedData = JSON.parse(ev.target.result); renderAll(); } catch { alert('Invalid JSON.'); } };
    r.readAsText(file);
  };
  input.click();
}

function buildLegend() {
  const grid = document.getElementById('legendGrid');
  CROPS.forEach(c => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-swatch" style="background:${c.color}"></span>${c.label}`;
    grid.appendChild(item);
  });
}

buildCropPanel();
wireBeds();
buildLegend();
</script>
